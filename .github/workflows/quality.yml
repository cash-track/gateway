name: quality

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    uses: cash-track/.github/.github/workflows/quality-go.yml@main
    with:
      exclude-packages: /mocks|cash-track/gateway$
    secrets: inherit